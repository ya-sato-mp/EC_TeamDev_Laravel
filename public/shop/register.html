<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新規登録 | ドラちゃんオフィシャルショップ</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="register">
    <header class="site-header simple">
        <a class="brand" href="./login.html">ドラちゃんオフィシャルショップ</a>
    </header>

    <main class="auth-page">
        <section class="auth-card">
            <p class="eyebrow">Register</p>
            <h1>新規登録</h1>
            <div id="message" class="message" role="status" aria-live="polite"></div>
            <form id="registerForm" class="form">
                <label>
                    名前
                    <input name="name" type="text" autocomplete="name" required>
                </label>
                <label>
                    メールアドレス
                    <input name="email" type="email" autocomplete="email" required>
                </label>
                <label>
                    パスワード
                    <input name="password" type="password" autocomplete="new-password" minlength="6" required>
                </label>
                <button class="primary-button" type="submit">登録する</button>
            </form>
            <p class="form-note">登録済みの場合は<a href="./login.html">ログイン</a></p>
        </section>
    </main>

    <script src="./app.js" defer></script>
</body>
</html>
