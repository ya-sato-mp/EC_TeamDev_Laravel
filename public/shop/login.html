<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログイン | ドラちゃんオフィシャルショップ</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="login">
    <header class="site-header simple">
        <a class="brand" href="./login.html">ドラちゃんオフィシャルショップ</a>
    </header>

    <main class="auth-page">
        <section class="auth-card">
            <p class="eyebrow">Login</p>
            <h1>ログイン</h1>
            <div id="message" class="message" role="status" aria-live="polite"></div>
            <form id="loginForm" class="form">
                <label>
                    メールアドレス
                    <input name="email" type="email" autocomplete="email" required>
                </label>
                <label>
                    パスワード
                    <input name="password" type="password" autocomplete="current-password" required>
                </label>
                <button class="primary-button" type="submit">ログイン</button>
            </form>
            <p class="form-note">アカウントがない場合は<a href="./register.html">新規登録</a></p>
        </section>
    </main>

    <script src="./app.js" defer></script>
</body>
</html>
