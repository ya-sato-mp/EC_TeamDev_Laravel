<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商品一覧 | ドラちゃんオフィシャルショップ</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="products">
    <header class="site-header">
        <a class="brand" href="./index.html">ドラちゃんオフィシャルショップ</a>
        <nav class="nav">
            <a href="./index.html">商品</a>
            <a href="./cart.html">カート</a>
            <a href="./orders.html">注文履歴</a>
            <a href="../admin/index.html" id="adminNavLink" class="is-hidden">管理</a>
            <button type="button" id="logoutButton">ログアウト</button>
        </nav>
    </header>

    <main class="page">
        <div class="page-head">
            <div>
                <p class="eyebrow">Products</p>
                <h1>商品一覧</h1>
            </div>
            <p id="userLabel" class="user-label"></p>
        </div>

        <div id="message" class="message" role="status" aria-live="polite"></div>

        <section class="search-panel panel">
            <form id="searchForm" class="search-form">
                <div class="search-field">
                    <label for="keywordInput">キーワード</label>
                    <input type="search" id="keywordInput" name="keyword" placeholder="商品名で検索...">
                </div>
                <div class="search-field">
                    <label for="categorySelect">カテゴリー</label>
                    <select id="categorySelect" name="category_id">
                        <option value="">すべてのカテゴリー</option>
                    </select>
                </div>
                <div class="search-field">
                    <label for="sortSelect">並び順</label>
                    <select id="sortSelect" name="sort">
                        <option value="">標準</option>
                        <option value="newest">新着順</option>
                    </select>
                </div>
                <div class="search-actions">
                    <button type="submit" class="primary-button">検索</button>
                    <button type="button" id="clearSearchButton" class="secondary-button">クリア</button>
                </div>
            </form>
        </section>

        <section id="productsList" class="product-grid"></section>
    </main>

    <script src="./app.js" defer></script>
</body>
</html>
